name: Sausage Store Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: ${{ secrets.SAUSAGE_STORE_NAMESPACE }}
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_ENABLED: ${{ vars.VAULT_ENABLED || 'false' }}
  VAULT_HOST: ${{ secrets.VAULT_HOST }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  CHART_VERSION: 0.2.${{ github.run_number }}

jobs:
  build_and_push_to_docker_hub:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/sausage-backend:latest
            ${{ secrets.DOCKER_USER }}/sausage-backend:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}

      - name: Push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
            ${{ secrets.DOCKER_USER }}/sausage-frontend:${{ github.sha }}

      - name: Push backend-report
        uses: docker/build-push-action@v6
        with:
          context: ./backend-report
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest
            ${{ secrets.DOCKER_USER }}/sausage-backend-report:${{ github.sha }}

  add_helm_chart_to_nexus:
    name: Add Helm chart to Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ./sausage-store-chart

      - name: Package chart
        run: helm package ./sausage-store-chart --version "${CHART_VERSION}" --app-version "${GITHUB_SHA}"

      - name: Upload chart to Nexus
        run: |
          CHART_PACKAGE="sausage-store-${CHART_VERSION}.tgz"
          curl -f -u "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" --upload-file "${CHART_PACKAGE}" "${NEXUS_HELM_REPO}/${CHART_PACKAGE}"

  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm chart to Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus
    steps:
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Nexus Helm repo
        run: |
          helm repo add nexus "${NEXUS_HELM_REPO}" --username "${NEXUS_HELM_REPO_USER}" --password "${NEXUS_HELM_REPO_PASSWORD}"
          helm repo update

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          printf "%s" "${KUBE_CONFIG}" | base64 -d > "${HOME}/.kube/config" || printf "%s" "${KUBE_CONFIG}" > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Deploy chart
        run: |
          helm upgrade --install sausage-store nexus/sausage-store \
            --version "${CHART_VERSION}" \
            --namespace "${SAUSAGE_STORE_NAMESPACE}" \
            --set global.imageRegistry="${{ secrets.DOCKER_USER }}" \
            --set backend.image.tag="${GITHUB_SHA}" \
            --set frontend.image.tag="${GITHUB_SHA}" \
            --set backend-report.image.tag="${GITHUB_SHA}" \
            --set global.vault.enabled="${VAULT_ENABLED}" \
            --set global.vault.host="${VAULT_HOST}" \
            --set global.vault.vaultToken="${VAULT_TOKEN}" \
            --history-max 3
