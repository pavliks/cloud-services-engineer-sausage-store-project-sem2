global:
  imageRegistry: itmp9
  imagePullPolicy: Always
  environment: production
  postgresql:
    host: postgresql
    port: 5432
    database: sausage-store
    username: store
    password: storepassword
  mongodb:
    host: mongodb
    port: 27017
    database: sausage-store
    reportUsername: reports
    reportPassword: reportspassword
  vault:
    enabled: false
    name: sausage-store-vault
    host: vault.example.local
    scheme: http
    kvEnabled: "true"
    vaultToken: ""

frontend:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  image:
    repository: sausage-frontend
    tag: latest
  service:
    port: 80
  ingress:
    host: front-ilyasachkov.2sem.students-projects.ru
    tlsSecret: 2sem-students-projects-wildcard-secret
    path: /
    pathType: Prefix
  containerPort: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  nginxConf: nginx.conf

backend:
  annotations:
    path: /actuator/prometheus
    port: "8080"
    scrape: "true"
  env:
    reportPath: /logs/reports
    logPath: /logs
  service:
    port: 8080
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: sausage-backend
    tag: latest
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1"
  containerPort: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  vpa:
    updatePolicy:
      updateMode: "Off"
    resourcePolicy:
      containerPolicies:
        - containerName: backend
          controlledResources:
            - cpu
            - memory

backend-report:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  image:
    repository: sausage-backend-report
    tag: latest
  service:
    port: 8080
  containerPort: 8080
  env:
    port: "8080"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    cpu:
      averageUtilization: 75

infra:
  postgresql:
    image: postgres:13-alpine
    containerPort: 5432
    storage: 1Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  mongodb:
    image: mongo:7.0
    containerPort: 27017
    rootUsername: root
    rootPassword: rootpassword
    storage: 1Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "500m"
    initJob:
      enabled: true
      image: mongo:7.0
